<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FROXX AI · Secure Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: radial-gradient(ellipse at 30% 40%, #0c0f1c 0%, #04060c 100%);
            font-family: 'Inter', system-ui, monospace;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            text-align: center;
            padding: 18px 20px 14px;
            background: rgba(6, 10, 18, 0.65);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(120, 90, 200, 0.3);
        }

        .chat-header h1 {
            background: linear-gradient(90deg, #b79eff, #6d4aff, #9b5eff, #7a4ad0, #b79eff);
            background-size: 300% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 2rem;
            animation: gradientShift 3s infinite alternate;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 28px;
            background: rgba(4, 7, 14, 0.7);
            border-bottom: 1px solid rgba(109, 74, 255, 0.25);
            font-size: 0.7rem;
        }

        .menu-trigger {
            position: fixed;
            top: 16px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(12, 10, 26, 0.9);
            border: 1px solid #7a5ad0;
            border-radius: 40px;
            color: #d0bcff;
            font-size: 24px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slideout-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 340px;
            height: 100vh;
            background: rgba(4, 5, 14, 0.98);
            border-right: 1px solid #5f48b0;
            z-index: 60;
            transform: translateX(-100%);
            transition: transform 0.3s;
            overflow-y: auto;
        }

        .slideout-menu.open {
            transform: translateX(0);
        }

        .menu-header {
            padding: 28px 24px 16px;
            border-bottom: 1px solid #3a2a7a;
        }

        .menu-header h2 {
            background: linear-gradient(90deg, #c4a5ff, #8a5aff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 1.4rem;
        }

        .login-section, .admin-panel {
            padding: 22px 24px;
        }

        .admin-panel {
            display: none;
            flex-direction: column;
            gap: 18px;
        }

        .admin-panel.visible {
            display: flex;
        }

        input, textarea {
            width: 100%;
            background: #0c0a18;
            border: 1px solid #5f46b0;
            border-radius: 28px;
            padding: 10px;
            color: #e5dbff;
            margin-bottom: 12px;
        }

        button {
            background: #2c1e70;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 0.75rem;
        }

        .user-msg {
            align-self: flex-end;
            background: #151a30;
            border: 1px solid #6d57bb;
            color: #f0eaff;
        }

        .ai-msg {
            align-self: flex-start;
            background: #0f1228;
            border: 1px solid #6a4ad0;
            color: #eae2ff;
        }

        .input-wrapper {
            margin: 6px 24px 20px;
            background: linear-gradient(135deg, #673AB7, #7E57C2);
            border-radius: 80px;
            padding: 2px;
        }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 4px 4px 4px 20px;
            background: #0c0e1c;
            border-radius: 80px;
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 14px 0;
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 6px;
            font-size: 0.55rem;
            color: #4d418b;
        }
    </style>
</head>
<body>
<div class="app">
    <button class="menu-trigger" id="menuBtn">≡</button>
    <div class="slideout-menu" id="slideMenu">
        <div class="menu-header"><h2>FROXX ADMIN</h2></div>
        <div class="login-section" id="loginSection">
            <input type="text" id="loginUser" placeholder="username">
            <input type="password" id="loginPass" placeholder="password">
            <button id="doLoginBtn">LOGIN</button>
        </div>
        <div class="admin-panel" id="adminPanel">
            <label>GROQ API KEY</label>
            <input type="password" id="apiKeyInput" placeholder="API Key">
            <label>API URL</label>
            <input type="text" id="apiUrlInput" value="https://api.groq.com/openai/v1/chat/completions">
            <label>MODEL</label>
            <input type="text" id="modelNameInput" value="llama-3.3-70b-versatile">
            <label>SYSTEM PROMPT</label>
            <textarea id="sysPromptInput" rows="3"></textarea>
            <button id="saveAdminConfig">SIMPAN</button>
            <button id="logoutBtn">LOGOUT</button>
        </div>
    </div>

    <div class="chat-header"><h1>FROXX AI</h1></div>
    <div class="status-bar"><span>🔒 secure mode</span><button id="clearChatBtn">reset</button></div>
    <div class="messages" id="messagesContainer"><div class="message ai-msg">FROXX AI aktif. Mode aman.</div></div>
    <div class="input-wrapper"><div class="input-area"><input id="userInput" placeholder="Ketik pesan..."><button id="sendBtn">Kirim</button></div></div>
    <footer>end-to-end protected · no credentials in HTML</footer>
</div>

<script>
    // Tidak ada data sensitif di sini. Semua konfigurasi disimpan via localStorage + validasi backend
    let isAdminLogged = false;
    let currentApiKey = "", currentApiUrl = "", currentModel = "", currentSystemPrompt = "";

    const menuBtn = document.getElementById('menuBtn');
    const slideMenu = document.getElementById('slideMenu');
    const loginSection = document.getElementById('loginSection');
    const adminPanel = document.getElementById('adminPanel');
    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const doLoginBtn = document.getElementById('doLoginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const saveAdminBtn = document.getElementById('saveAdminConfig');
    const sendBtn = document.getElementById('sendBtn');
    const userInput = document.getElementById('userInput');
    const messagesDiv = document.getElementById('messagesContainer');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiUrlInput = document.getElementById('apiUrlInput');
    const modelNameInput = document.getElementById('modelNameInput');
    const sysPromptInput = document.getElementById('sysPromptInput');

    menuBtn.onclick = () => slideMenu.classList.toggle('open');

    async function callAPI(endpoint, data) {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return res.json();
    }

    async function loginAdmin() {
        const result = await callAPI('/api/config', { action: 'login', user: loginUser.value, pass: loginPass.value });
        if (result.success) {
            isAdminLogged = true;
            loginSection.style.display = 'none';
            adminPanel.classList.add('visible');
            // load config from server
            const cfg = await callAPI('/api/config', { action: 'getConfig' });
            if (cfg.apiKey) apiKeyInput.value = cfg.apiKey;
            apiUrlInput.value = cfg.apiUrl || "https://api.groq.com/openai/v1/chat/completions";
            modelNameInput.value = cfg.model || "llama-3.3-70b-versatile";
            sysPromptInput.value = cfg.systemPrompt || "";
            currentApiKey = cfg.apiKey;
            currentApiUrl = cfg.apiUrl;
            currentModel = cfg.model;
            currentSystemPrompt = cfg.systemPrompt;
            addSystemMessage("Admin login. Konfigurasi dimuat dari server.");
        } else alert("Login gagal.");
    }

    async function saveAdminConfig() {
        if (!isAdminLogged) return;
        await callAPI('/api/config', {
            action: 'saveConfig',
            apiKey: apiKeyInput.value,
            apiUrl: apiUrlInput.value,
            model: modelNameInput.value,
            systemPrompt: sysPromptInput.value
        });
        currentApiKey = apiKeyInput.value;
        currentApiUrl = apiUrlInput.value;
        currentModel = modelNameInput.value;
        currentSystemPrompt = sysPromptInput.value;
        addSystemMessage("Konfigurasi tersimpan di server.");
    }

    function logoutAdmin() {
        isAdminLogged = false;
        loginSection.style.display = 'block';
        adminPanel.classList.remove('visible');
        addSystemMessage("Logout.");
    }

    function addSystemMessage(msg) {
        const div = document.createElement('div'); div.className = 'message system-msg'; div.innerText = msg;
        messagesDiv.appendChild(div); div.scrollIntoView({ behavior: 'smooth' });
    }

    function addMessage(text, isUser) {
        const div = document.createElement('div'); div.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
        div.innerText = text; messagesDiv.appendChild(div); div.scrollIntoView({ behavior: 'smooth' });
    }

    let loading = false;
    async function sendMessage() {
        if (loading) return;
        const msg = userInput.value.trim();
        if (!msg) return;
        addMessage(msg, true);
        userInput.value = "";
        loading = true;
        sendBtn.disabled = true;
        try {
            const res = await callAPI('/api/chat', { message: msg, apiKey: currentApiKey, apiUrl: currentApiUrl, model: currentModel, systemPrompt: currentSystemPrompt });
            addMessage(res.reply, false);
        } catch(e) { addMessage("Error: " + e.message, false); }
        finally { loading = false; sendBtn.disabled = false; userInput.focus(); }
    }

    function clearChat() { while (messagesDiv.firstChild) messagesDiv.removeChild(messagesDiv.firstChild); addSystemMessage("Chat direset."); }

    doLoginBtn.onclick = loginAdmin;
    logoutBtn.onclick = logoutAdmin;
    saveAdminBtn.onclick = saveAdminConfig;
    sendBtn.onclick = sendMessage;
    clearChatBtn.onclick = clearChat;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
